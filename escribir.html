<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>MiniTwitter</title>
    <script src="../js/escribir.js" defer></script>
    <link rel="stylesheet" href="../css/estilo.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="../imgs/Pestaña.png">
</head>

<body>
    <div class="botones_escribir">
        <button class="volver_perfil_escribir" id="volver_tuits"></button>
        <p id="Titulo_escribir" class="logo_escribir">MINITWITTER</p>
        <button id="volver_perfil"></button>
    </div>
    <div class="escribir_tuit_perfil">
        <p class="nombre_de_usuario_tuit"><span id="nombre-usuario-display"></span></p>
        <input type="text" id="tuit_input_perfil_texto" placeholder="¿Qué estás pensando?">
        <input type="text" id="tuit_input_perfil_url" placeholder="|Adjunta una url!">
        <button id="publicar_tuit_perfil">¡Publicar!</button>
    </div>
</body>

</html>
